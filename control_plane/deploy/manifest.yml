# Declarative deployment manifest — the single source of truth for what gets deployed.
# Names only; workspace + item IDs are resolved at runtime (nothing env-specific here).
# Adding an item = one line. Consumed by cp_deploy / cp_pipeline / cp_bootstrap.

lakehouses: [LH_metadata, LH_bronze, LH_silver, LH_gold, LH_Filedrop]
sql_database: config_db
variable_library: cp_vars

# Notebooks in DEPLOY ORDER (cp_framework first; others %run it). folder = workspace subfolder.
# cp_framework is GENERATED from src/cp/ by deploy/cp_bundle.py (cp_deploy regenerates it on deploy);
# the worker notebooks are 3-cell shells that call into cp/workers. See docs/DESIGN.md.
notebooks:
  - { name: cp_framework,   folder: utility }
  - { name: cp_plan,        folder: utility }
  - { name: cp_log_fail,    folder: utility }
  - { name: cp_connection_builder, folder: utility }
  - { name: cp_seed_demo,   folder: utility }
  - { name: metadata_worker, folder: notebook }
  - { name: bronze_worker,  folder: notebook }
  - { name: silver_worker,  folder: notebook }
  - { name: gold_runner,    folder: notebook }
  - { name: dropbox_worker, folder: notebook }
  - { name: sq_dim_category,          folder: sourcequery }
  - { name: sq_dim_subcategory,       folder: sourcequery }
  - { name: sq_dim_product,           folder: sourcequery }
  - { name: sq_dim_territory,         folder: sourcequery }
  - { name: sq_dim_customer,          folder: sourcequery }
  - { name: sq_fact_sales_order,      folder: sourcequery }
  - { name: sq_fact_sales_by_territory, folder: sourcequery }
  - { name: sq_voc_dim_survey,        folder: sourcequery }
  - { name: sq_voc_dim_plan,          folder: sourcequery }
  - { name: sq_voc_dim_question,      folder: sourcequery }
  - { name: sq_voc_fact_survey_response, folder: sourcequery }
  - { name: sq_voc_fact_survey_answer,   folder: sourcequery }

# Data pipelines in DEPLOY ORDER (children before main). Builders live in cp_pipeline.py.
# cp_pl_onprem = generic on-prem ingestion (Copy via the on-premises data gateway → bronze staging,
# then bronze_worker); needs a gateway + Fabric connection to run (see docs).
pipelines: [cp_pl_metadata, cp_pl_bronze, cp_pl_onprem, cp_pl_silver, cp_pl_gold, cp_pl_pbi, cp_pl_dropbox, cp_pl_main]

# Items to remove from every environment on deploy (superseded by the pipeline orchestration).
superseded_notebooks: [cp_01_setup, cp_02_ingest_bronze, cp_03_build_silver,
                       cp_04_build_gold, cp_09_orchestrate]

# OPTIONAL — opt-in driver Environment. Not needed for plug-and-play: SQL Server / Postgres /
# MySQL JDBC jars are bundled, and the Oracle/DB2 connectors self-install their pure-Python
# driver on demand. Uncomment to pre-install drivers (zero per-session pip) and/or add Oracle/DB2
# JDBC jars for DISTRIBUTED Spark JDBC (connection_json.mode='jdbc'). Publish takes minutes;
# set_default adds session startup time for ALL notebooks (leave false unless needed).
# environment:
#   name: cp_ingest_drivers
#   pip: [oracledb, ibm_db]                    # pre-install the pure-Python drivers
#   jars: []                                   # e.g. [control_plane/deploy/jars/ojdbc11.jar] (operator-supplied)
#   attach: [bronze_worker]                    # notebooks bound to the env (only these pay startup cost)
#   set_default: false                         # true = ALL notebooks use it (slower session starts)
